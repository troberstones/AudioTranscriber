<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Transcriber</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2d3148;
      --text:      #e8eaf0;
      --muted:     #7b82a0;
      --accent:    #5b6ef5;
      --accent-h:  #6f7ef7;
      --success:   #22c55e;
      --error:     #ef4444;
      --warn:      #f59e0b;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }
    header .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 680px) {
      .grid-top { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--bg);
      border-radius: 8px;
      padding: 3px;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Record tab */
    .record-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
    }
    #record-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      position: relative;
    }
    #record-btn:hover { background: rgba(91,110,245,.12); }
    #record-btn.recording { border-color: var(--error); animation: pulse 1.4s infinite; }
    #record-btn .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      transition: all .2s;
    }
    #record-btn.recording .dot {
      background: var(--error);
      border-radius: 4px;
      width: 18px;
      height: 18px;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
      50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    }
    #record-timer { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
    #record-timer.active { color: var(--error); font-weight: 600; }

    /* Upload tab */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(91,110,245,.06);
    }
    #drop-zone .icon { font-size: 28px; margin-bottom: 8px; }
    #drop-zone p { font-size: 13px; }
    #file-input { display: none; }

    /* Audio preview */
    .audio-preview-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-top: 12px;
    }
    .audio-preview-row audio {
      flex: 1;
      height: 32px;
      min-width: 0;
      accent-color: var(--accent);
    }
    .audio-preview-row audio::-webkit-media-controls-panel {
      background: var(--bg);
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
    }
    .clear-btn:hover { color: var(--error); }
    #audio-filename { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    /* Settings */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .field select, .field input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .field select:focus, .field input[type="number"]:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }
    .check-label input { accent-color: var(--accent); width: 14px; height: 14px; }

    /* Transcribe button */
    #transcribe-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 24px;
    }
    #transcribe-btn:hover:not(:disabled) { background: var(--accent-h); }
    #transcribe-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Progress */
    #progress-section {
      display: none;
      margin-bottom: 24px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8b9fff);
      border-radius: 999px;
      transition: width .4s ease;
      width: 0%;
    }
    #progress-msg { font-size: 13px; color: var(--muted); }

    /* Error banner */
    #error-banner {
      display: none;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--error);
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* Results */
    #results-section { display: none; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-tabs { display: flex; gap: 4px; }
    .result-tab {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .result-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .dl-buttons { display: flex; gap: 8px; }
    .dl-btn {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: all .15s;
      cursor: pointer;
    }
    .dl-btn:hover { border-color: var(--accent); color: var(--accent); }

    #transcript {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      max-height: 62vh;
      overflow-y: auto;
    }

    /* Markdown styles inside transcript */
    #transcript h1 { font-size: 20px; margin-bottom: 12px; color: #fff; }
    #transcript h2 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: var(--text); }
    #transcript p { margin-bottom: 8px; color: var(--text); }
    #transcript strong { color: #fff; }
    #transcript code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-size: 12px; color: var(--warn); }
    #transcript hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    #transcript ul, #transcript ol { padding-left: 20px; margin-bottom: 10px; }
    #transcript li { margin-bottom: 3px; }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    #empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Audio Transcriber</h1>
    <div class="subtitle">Speaker diarization powered by WhisperX + pyannote</div>
  </div>
</header>

<main>
  <div class="grid-top">

    <!-- Audio Input card -->
    <div class="card">
      <div class="card-title">Audio Input</div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="record">Record</button>
        <button class="tab-btn" data-tab="upload">Upload File</button>
      </div>

      <!-- Record pane -->
      <div class="tab-pane active" id="pane-record">
        <div class="record-area">
          <button id="record-btn" title="Start / stop recording">
            <span class="dot"></span>
          </button>
          <span id="record-timer">00:00</span>
        </div>
      </div>

      <!-- Upload pane -->
      <div class="tab-pane" id="pane-upload">
        <div id="drop-zone">
          <div class="icon">🎵</div>
          <p>Drop an audio or video file here</p>
          <p style="margin-top:4px;font-size:11px;">or click to browse</p>
          <input type="file" id="file-input" accept="audio/*,video/*">
        </div>
      </div>

      <!-- Shared audio preview -->
      <div class="audio-preview-row" id="audio-preview-row" style="display:none">
        <span id="audio-filename"></span>
        <audio id="audio-player" controls></audio>
        <button class="clear-btn" id="clear-audio" title="Remove">✕</button>
      </div>
    </div>

    <!-- Settings card -->
    <div class="card">
      <div class="card-title">Settings</div>

      <div class="field">
        <label>Whisper Model</label>
        <select id="model-size">
          <option value="tiny">Tiny — fastest</option>
          <option value="base">Base</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large-v2" selected>Large v2 — recommended</option>
          <option value="large-v3">Large v3</option>
        </select>
      </div>

      <div class="field">
        <label>Language</label>
        <select id="language">
          <option value="">Auto-detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="nl">Dutch</option>
          <option value="pl">Polish</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="tr">Turkish</option>
        </select>
      </div>

      <div class="field">
        <label>Speaker Detection</label>
        <select id="speaker-mode">
          <option value="auto">Auto-detect count</option>
          <option value="fixed">Fixed count</option>
        </select>
      </div>

      <div id="auto-speaker-fields">
        <div class="field field-row">
          <div>
            <label>Min speakers</label>
            <input type="number" id="min-speakers" value="1" min="0" max="20">
          </div>
          <div>
            <label>Max speakers</label>
            <input type="number" id="max-speakers" value="10" min="0" max="50">
          </div>
        </div>
      </div>

      <div id="fixed-speaker-fields" style="display:none">
        <div class="field">
          <label>Number of speakers</label>
          <input type="number" id="num-speakers" value="2" min="1" max="50">
        </div>
      </div>

      <label class="check-label">
        <input type="checkbox" id="include-json" checked>
        Export JSON with timestamps
      </label>

      <label class="check-label" style="margin-top:10px">
        <input type="checkbox" id="generate-summary">
        Generate AI summary <span style="color:var(--muted);font-size:11px">(Ollama / gemma4:e4b)</span>
      </label>
    </div>

  </div><!-- /grid-top -->

  <button id="transcribe-btn" disabled>Transcribe</button>

  <div id="error-banner"></div>

  <div id="progress-section">
    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-msg">Starting...</div>
  </div>

  <div id="results-section">
    <div class="results-header">
      <div class="result-tabs">
        <button class="result-tab active" data-result="transcript">Transcript</button>
        <button class="result-tab" data-result="summary" id="summary-tab-btn" style="display:none">AI Summary</button>
      </div>
      <div class="dl-buttons">
        <a id="dl-md" class="dl-btn" href="#" style="display:none">↓ Markdown</a>
        <a id="dl-json" class="dl-btn" href="#" style="display:none">↓ JSON</a>
      </div>
    </div>
    <div id="transcript" class="result-pane"></div>
    <div id="summary" class="result-pane" style="display:none"></div>
  </div>

  <div id="empty-state">
    <div class="big-icon">🎙</div>
    <p>Record or upload an audio file, then click <strong>Transcribe</strong>.</p>
  </div>

</main>

<script>
(function () {
  // ── State ────────────────────────────────────────────────────────────────────
  let activeTab = 'record';
  let audioBlob = null;   // from recording
  let uploadedFile = null; // from file picker
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let timerInterval = null;
  let recordingSeconds = 0;

  // ── Elements ─────────────────────────────────────────────────────────────────
  const recordBtn       = document.getElementById('record-btn');
  const recordTimer     = document.getElementById('record-timer');
  const dropZone        = document.getElementById('drop-zone');
  const fileInput       = document.getElementById('file-input');
  const audioPreviewRow = document.getElementById('audio-preview-row');
  const audioPlayer     = document.getElementById('audio-player');
  const audioFilename   = document.getElementById('audio-filename');
  const clearAudioBtn   = document.getElementById('clear-audio');
  const modelSelect     = document.getElementById('model-size');
  const languageSelect  = document.getElementById('language');
  const speakerMode     = document.getElementById('speaker-mode');
  const autoFields      = document.getElementById('auto-speaker-fields');
  const fixedFields     = document.getElementById('fixed-speaker-fields');
  const minSpeakers     = document.getElementById('min-speakers');
  const maxSpeakers     = document.getElementById('max-speakers');
  const numSpeakers     = document.getElementById('num-speakers');
  const includeJson     = document.getElementById('include-json');
  const generateSummary = document.getElementById('generate-summary');
  const transcribeBtn   = document.getElementById('transcribe-btn');
  const errorBanner     = document.getElementById('error-banner');
  const progressSection = document.getElementById('progress-section');
  const progressFill    = document.getElementById('progress-fill');
  const progressMsg     = document.getElementById('progress-msg');
  const resultsSection  = document.getElementById('results-section');
  const transcriptDiv   = document.getElementById('transcript');
  const summaryDiv      = document.getElementById('summary');
  const summaryTabBtn   = document.getElementById('summary-tab-btn');
  const emptyState      = document.getElementById('empty-state');
  const dlMd            = document.getElementById('dl-md');
  const dlJson          = document.getElementById('dl-json');

  // Result tabs
  document.querySelectorAll('.result-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.result-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.result-pane').forEach(p => p.style.display = 'none');
      btn.classList.add('active');
      document.getElementById(btn.dataset.result).style.display = 'block';
    });
  });

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-' + tab).classList.add('active');
    });
  });

  // ── Speaker mode ─────────────────────────────────────────────────────────────
  speakerMode.addEventListener('change', () => {
    const fixed = speakerMode.value === 'fixed';
    autoFields.style.display  = fixed ? 'none' : '';
    fixedFields.style.display = fixed ? '' : 'none';
  });

  // ── Recording ────────────────────────────────────────────────────────────────
  recordBtn.addEventListener('click', () => {
    if (isRecording) stopRecording(); else startRecording();
  });

  async function startRecording() {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      showError('Microphone access denied: ' + err.message);
      return;
    }

    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      audioBlob = new Blob(audioChunks, { type: mimeType });
      uploadedFile = null;
      setAudioPreview(URL.createObjectURL(audioBlob), 'recording.webm');
      stream.getTracks().forEach(t => t.stop());
      updateTranscribeBtn();
    };

    mediaRecorder.start(250);
    isRecording = true;
    recordBtn.classList.add('recording');
    startTimer();
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    recordBtn.classList.remove('recording');
    stopTimer();
  }

  function startTimer() {
    recordingSeconds = 0;
    recordTimer.classList.add('active');
    timerInterval = setInterval(() => {
      recordingSeconds++;
      recordTimer.textContent = fmtTime(recordingSeconds);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    recordTimer.classList.remove('active');
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  // ── File upload ───────────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setUploadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setUploadFile(fileInput.files[0]);
  });

  function setUploadFile(file) {
    uploadedFile = file;
    audioBlob = null;
    setAudioPreview(URL.createObjectURL(file), file.name);
    updateTranscribeBtn();
  }

  // ── Audio preview ─────────────────────────────────────────────────────────────
  function setAudioPreview(url, name) {
    audioPlayer.src = url;
    audioFilename.textContent = name;
    audioPreviewRow.style.display = 'flex';
  }

  clearAudioBtn.addEventListener('click', () => {
    audioBlob = null;
    uploadedFile = null;
    audioPlayer.src = '';
    audioPreviewRow.style.display = 'none';
    audioFilename.textContent = '';
    fileInput.value = '';
    recordTimer.textContent = '00:00';
    updateTranscribeBtn();
  });

  function updateTranscribeBtn() {
    transcribeBtn.disabled = !(audioBlob || uploadedFile);
  }

  // ── Transcription ─────────────────────────────────────────────────────────────
  transcribeBtn.addEventListener('click', runTranscribe);

  async function runTranscribe() {
    const file = activeTab === 'record' ? audioBlob : uploadedFile;
    if (!file) return;

    hideError();
    showProgress(0, 'Uploading audio...');
    transcribeBtn.disabled = true;

    const form = new FormData();
    const filename = activeTab === 'record' ? 'recording.webm' : (uploadedFile ? uploadedFile.name : 'audio.webm');
    form.append('audio', file, filename);
    form.append('model_size', modelSelect.value);
    form.append('language', languageSelect.value);
    form.append('speaker_mode', speakerMode.value);
    form.append('include_json', includeJson.checked ? 'true' : 'false');
    form.append('generate_summary', generateSummary.checked ? 'true' : 'false');

    if (speakerMode.value === 'fixed') {
      form.append('num_speakers', numSpeakers.value);
    } else {
      if (parseInt(minSpeakers.value) > 0) form.append('min_speakers', minSpeakers.value);
      if (parseInt(maxSpeakers.value) > 0) form.append('max_speakers', maxSpeakers.value);
    }

    let jobId;
    try {
      const resp = await fetch('/transcribe', { method: 'POST', body: form });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: 'Upload failed' }));
        throw new Error(err.detail || 'Upload failed');
      }
      const data = await resp.json();
      jobId = data.job_id;
    } catch (err) {
      showError(err.message);
      transcribeBtn.disabled = false;
      hideProgress();
      return;
    }

    // SSE stream
    const evtSource = new EventSource('/stream/' + jobId);
    let jobDone = false;

    evtSource.addEventListener('progress', e => {
      const { frac, msg } = JSON.parse(e.data);
      showProgress(frac, msg);
    });

    evtSource.addEventListener('done', e => {
      jobDone = true;
      evtSource.close();
      const result = JSON.parse(e.data);
      hideProgress();
      showResult(result);
      transcribeBtn.disabled = false;
    });

    evtSource.addEventListener('pipeline_error', e => {
      jobDone = true;
      evtSource.close();
      hideProgress();
      transcribeBtn.disabled = false;
      let msg = 'Pipeline error';
      try { msg = JSON.parse(e.data).message; } catch (_) {}
      showError(msg);
    });

    // Only fires for genuine connection drops, not after a terminal event
    evtSource.onerror = () => {
      if (jobDone) return;
      evtSource.close();
      hideProgress();
      transcribeBtn.disabled = false;
      showError('Lost connection to server — check the server terminal for the full error.');
    };
  }

  // ── UI helpers ────────────────────────────────────────────────────────────────
  function showProgress(frac, msg) {
    emptyState.style.display = 'none';
    resultsSection.style.display = 'none';
    progressSection.style.display = 'block';
    progressFill.style.width = Math.round(frac * 100) + '%';
    progressMsg.textContent = msg;
  }

  function hideProgress() {
    progressSection.style.display = 'none';
  }

  function showResult(result) {
    emptyState.style.display = 'none';
    progressSection.style.display = 'none';
    resultsSection.style.display = 'block';

    // Always show transcript tab first
    transcriptDiv.innerHTML = marked.parse(result.markdown || '');
    transcriptDiv.style.display = 'block';
    summaryDiv.style.display = 'none';
    document.querySelectorAll('.result-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('.result-tab[data-result="transcript"]').classList.add('active');

    // Summary tab
    if (result.summary) {
      summaryDiv.innerHTML = marked.parse(result.summary);
      summaryTabBtn.style.display = '';
    } else if (result.summary_error) {
      summaryDiv.innerHTML = `<p style="color:var(--error)">Summary failed: ${result.summary_error}</p>`;
      summaryTabBtn.style.display = '';
    } else {
      summaryTabBtn.style.display = 'none';
    }

    dlMd.style.display  = result.md_url  ? '' : 'none';
    dlJson.style.display = result.json_url ? '' : 'none';
    if (result.md_url)   { dlMd.href  = result.md_url;  dlMd.download  = ''; }
    if (result.json_url) { dlJson.href = result.json_url; dlJson.download = ''; }
  }

  function showError(msg) {
    errorBanner.textContent = '⚠ ' + msg;
    errorBanner.style.display = 'block';
  }

  function hideError() {
    errorBanner.style.display = 'none';
  }

})();
</script>
</body>
</html>
